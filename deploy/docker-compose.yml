# AIOS Production Stack
# =====================
# Start: docker compose -f deploy/docker-compose.yml up -d
# With GPU: docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.gpu.yml up -d
# With monitoring: ... -f deploy/docker-compose.monitoring.yml up -d

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

x-restart: &restart-policy
  restart: unless-stopped

services:

  # ---- AIOS API Server ----
  aios-api:
    <<: [*restart-policy]
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: aios:latest
    container_name: aios-api
    ports:
      - "8000:8000"
    volumes:
      - aios_data:/data
      - aios_logs:/var/log/aios
    environment:
      AIOS_HOST: "0.0.0.0"
      AIOS_PORT: "8000"
      AIOS_WORKERS: "2"
      AIOS_LOG_LEVEL: "info"
      AIOS_PROVIDER: "${AIOS_PROVIDER:-ollama}"
      AIOS_MODEL: "${AIOS_MODEL:-llama3.1:8b}"
      AIOS_API_BASE: "${AIOS_API_BASE:-http://ollama:11434/v1}"
      AIOS_API_KEY: "${AIOS_API_KEY:-}"
      AIOS_CORS_ALLOW_ORIGINS: "${AIOS_CORS_ALLOW_ORIGINS:-*}"
      AIOS_RATE_LIMIT_ENABLED: "true"
      AIOS_RATE_LIMIT_REQUESTS: "60"
      AIOS_RATE_LIMIT_WINDOW: "60"
      AIOS_DATA_DIR: "/data"
      AIOS_LOGS_DIR: "/var/log/aios"
      AIOS_ENABLE_PROMETHEUS: "true"
    depends_on:
      ollama:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "python", "deploy/scripts/healthcheck.py", "--url", "http://localhost:8000/v1/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *default-logging
    networks:
      - aios-net

  # ---- Nginx Reverse Proxy ----
  nginx:
    <<: [*restart-policy]
    image: nginx:1.27-alpine
    container_name: aios-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/aios.conf:/etc/nginx/conf.d/default.conf:ro
      - aios_ssl:/etc/nginx/ssl:ro
      - aios_logs:/var/log/nginx
    depends_on:
      - aios-api
    logging: *default-logging
    networks:
      - aios-net

  # ---- Ollama Inference Server ----
  ollama:
    <<: [*restart-policy]
    build:
      context: ..
      dockerfile: deploy/Dockerfile.ollama
    image: aios-ollama:latest
    container_name: aios-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_KEEP_ALIVE: "24h"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    logging: *default-logging
    networks:
      - aios-net
    profiles:
      - ""
      - ollama

volumes:
  aios_data:
    driver: local
  aios_logs:
    driver: local
  aios_ssl:
    driver: local
  ollama_models:
    driver: local

networks:
  aios-net:
    driver: bridge
    name: aios-net
