# AIOS logrotate configuration
# Install: sudo cp logrotate.conf /etc/logrotate.d/aios
# Test:    sudo logrotate -d /etc/logrotate.d/aios

/var/log/aios/*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    dateext
    dateformat -%Y%m%d
    maxsize 100M
    sharedscripts
    postrotate
        # Send SIGHUP to the AIOS process to reopen logs
        if [ -f /run/aios/aios.pid ]; then
            kill -HUP $(cat /run/aios/aios.pid) 2>/dev/null || true
        fi
    endscript
}

/var/log/nginx/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    dateext
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
    endscript
}
