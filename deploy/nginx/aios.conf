# AIOS Nginx configuration
# Reverse proxy with rate limiting, buffering, and SSL termination.

upstream aios_api {
    zone aios_api 64k;
    server aios-api:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# HTTP -> HTTPS redirect
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name aios.local;

    # SSL (place certificates in deploy/nginx/ssl/)
    ssl_certificate     /etc/nginx/ssl/aios.crt;
    ssl_certificate_key /etc/nginx/ssl/aios.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           DENY always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           strict-origin-when-cross-origin always;

    # ---- API Proxy ----
    location /v1/ {
        proxy_pass http://aios_api;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;

        # Buffering for streaming endpoints
        proxy_buffering off;
        proxy_cache off;

        # Rate limiting
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
    }

    # ---- SSE Streaming (no buffering) ----
    location /v1/chat/stream {
        proxy_pass http://aios_api;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # ---- Health endpoints (no rate limit) ----
    location /v1/health {
        proxy_pass http://aios_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    location /v1/live {
        proxy_pass http://aios_api;
        proxy_set_header Host $host;
        access_log off;
    }

    location /v1/ready {
        proxy_pass http://aios_api;
        proxy_set_header Host $host;
        access_log off;
    }

    # ---- Docs ----
    location /docs {
        proxy_pass http://aios_api;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://aios_api;
        proxy_set_header Host $host;
        access_log off;
    }

    # ---- Prometheus metrics (internal) ----
    location /metrics {
        proxy_pass http://aios-api:9090;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        access_log off;
    }

    # ---- Static assets ----
    location /static/ {
        root /var/www/aios;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ---- Deny sensitive paths ----
    location ~ /\.(env|git|venv) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.py$ {
        deny all;
    }

    # ---- Error pages ----
    error_page 404 /404.html;
    error_page 429 /429.html;
    error_page 500 502 503 504 /50x.html;

    # ---- Access & error logs ----
    access_log /var/log/nginx/aios-access.log;
    error_log  /var/log/nginx/aios-error.log warn;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
