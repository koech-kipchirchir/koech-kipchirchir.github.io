# AIOS Fine-tuning Configuration
# ==============================

model:
  provider: huggingface
  name: Qwen/Qwen3-8B-Instruct

training:
  method: qlora
  epochs: 3
  learning_rate: 2e-4
  batch_size: 1
  gradient_accumulation: 16
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_seq_length: 4096
  save_steps: 100
  eval_steps: 100
  logging_steps: 10
  output_dir: outputs
  seed: 42

lora:
  r: 64
  alpha: 128
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

export:
  save_adapter: true
  merge_model: true
  export_gguf: true
  export_ollama: true
